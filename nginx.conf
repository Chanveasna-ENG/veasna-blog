worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /tmp/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Enable Gzip Compression to shrink HTML, CSS, and JS sizes
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Define a Rate Limiting zone (10 requests per second per IP)
    limit_req_zone $binary_remote_addr zone=mylimit:10m rate=10r/s;

    server {
        listen       8080;
        server_name  localhost;
        root         /usr/share/nginx/html;
        index        index.html;

        # Apply the rate limiting (Allows bursts of 20 requests at once)
        limit_req zone=mylimit burst=20 nodelay;

        # Basic Security Headers
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-XSS-Protection "1; mode=block";
        add_header X-Content-Type-Options "nosniff";
        add_header Referrer-Policy "strict-origin-when-cross-origin";

        # Handle standard routing. If file isn't found, trigger a 404
        location / {
            try_files $uri $uri/ =404;
        }

        # Heavy Caching for Static Assets (Images, CSS, JS) - Cache for 1 Year
        location ~* \.(?:css|js|jpg|svg|gif|png|ico|webp|avif|woff2?|eot|ttf)$ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            access_log off;
        }

        # Point 404 errors to Astro's generated 404 page
        error_page 404 /404.html;
        location = /404.html {
            internal;
        }
    }
}
